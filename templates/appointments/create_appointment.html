
{% extends 'base.html' %}
{% load static %}

{% block title %}Create appointment{% endblock %}

{% block extra-styles %}
    <script src="https://cdn.tailwindcss.com"></script>
{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-200 py-8 px-4 text-black">
    <div class="max-w-lg mx-auto">
        <!-- Simple Card -->
        <div class="bg-blue-200 rounded-lg shadow-md p-6">
            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Appointment Form</h1>
                <p class="text-gray-600 mt-2">Doctor: <span class="font-semibold text-blue-600">{{ doctor.name }}</span></p>
            </div>

            <!-- Form -->
            <form method="post" action="" class="space-y-4">
                {% csrf_token %}

                <!-- Date Selection -->
                <div>
                    <label for="appointment_date" class="block text-sm font-medium text-gray-700 mb-1">
                        Select Appointment Date:
                    </label>
                    <input type="date"
                           id="appointment_date"
                           name="appointment_date"
                           required
                           min="{{ today|date:'Y-m-d' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Time Selection -->
                <div>
                    <label for="appointment_time" class="block text-sm font-medium text-gray-700 mb-1">
                        Select Appointment Time:
                    </label>
                    <select id="appointment_time"
                            name="appointment_time"
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">-- Select Time Slot --</option>
                        {% if doctor.doctortimeslot_set.all %}
                            {% for slot in doctor.doctortimeslot_set.all %}
                                <option value="{{ slot.id }}">
                                    {{ slot.start_time }} - {{ slot.end_time }}
                                </option>
                            {% endfor %}
                        {% else %}
                            <option value="" disabled>No time slots available</option>
                        {% endif %}
                    </select>
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                        Disease Description:
                    </label>
                    <textarea id="description"
                              name="description"
                              rows="4"
                              maxlength="1000"
                              required
                              placeholder="Describe your symptoms..."
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"></textarea>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition duration-200">
                        Register
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
